set_mode:
  name: Set mode
  description: Set SonnenBatterie operation mode.
  fields:
    mode:
      name: Mode
      description: Set SonnenBatterie operation mode.
      required: true
      selector:
        select:
          options:
            - Auto (Idle)
            - Schnellladen dann Auto
            - Angepasst Laden
            - Entladen
            - Standby
            - Schnellladen dann Standby